  spring:
    jpa:
      defer-datasource-initialization:  true
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      hibernate:
        ddl-auto: create-drop
    datasource:
        driver-class-name: org.h2.Driver
        url: jdbc:h2:mem:testdb
        username: sa
        password:
    h2:
      console:
        enabled: true
        path: /h2
